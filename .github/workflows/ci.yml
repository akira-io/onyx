name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Format
        if: matrix.os != 'windows-latest'
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -race
